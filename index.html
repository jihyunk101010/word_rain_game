<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>WORD RAIN — 수능 영단어 타자게임</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&family=VT323&display=swap');

  :root {
    --bg: #f5f0e8;
    --panel-bg: #e8e0d0;
    --dot: #c8bfaf;
    --accent: #d43000;
    --accent2: #0055cc;
    --accent3: #007700;
    --dark: #1a1008;
    --mid: #5a4a30;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background-color: var(--bg);
    background-image: radial-gradient(circle, var(--dot) 1.2px, transparent 1.2px);
    background-size: 20px 20px;
    color: var(--dark);
    font-family: 'Press Start 2P', monospace;
    height: 100vh;
    overflow: hidden;
    display: flex;
    flex-direction: column;
    user-select: none;
  }

  /* ── Header ── */
  #header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 8px 16px;
    background: var(--panel-bg);
    border-bottom: 3px solid var(--dark);
    box-shadow: 0 3px 0 var(--mid);
    flex-shrink: 0;
    z-index: 10;
  }
  #title {
    font-size: 15px;
    color: var(--accent);
    text-shadow: 2px 2px 0 var(--dark);
    letter-spacing: 2px;
  }
  .stat-block { display: flex; gap: 18px; align-items: center; }
  .stat { text-align: center; }
  .stat-label { font-size: 6px; color: var(--mid); letter-spacing: 1px; margin-bottom: 2px; }
  .stat-value {
    font-family: 'VT323', monospace;
    font-size: 26px;
    color: var(--accent2);
    line-height: 1;
    text-shadow: 1px 1px 0 var(--dark);
  }

  #pause-btn {
    font-family: 'Press Start 2P', monospace;
    font-size: 8px;
    padding: 6px 10px;
    background: var(--dark);
    color: var(--bg);
    border: 3px solid var(--dark);
    cursor: pointer;
    box-shadow: 3px 3px 0 var(--mid);
    letter-spacing: 1px;
    display: none;
    transition: transform 0.05s, box-shadow 0.05s;
  }
  #pause-btn.visible { display: block; }
  #pause-btn:hover { transform: translate(1px,1px); box-shadow: 2px 2px 0 var(--mid); }
  #pause-btn:active { transform: translate(3px,3px); box-shadow: none; }

  /* ── Game Area ── */
  #game-area {
    flex: 1;
    position: relative;
    overflow: hidden;
  }
  #game-area::before {
    content: '';
    position: absolute;
    inset: 0;
    background-image:
      linear-gradient(rgba(180,160,140,0.12) 1px, transparent 1px),
      linear-gradient(90deg, rgba(180,160,140,0.12) 1px, transparent 1px);
    background-size: 20px 20px;
    pointer-events: none;
    z-index: 1;
  }

  /* ── Bombs ── */
  .word-bomb {
    position: absolute;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 3px;
    z-index: 3;
  }
  .bomb-pixel {
    width: 18px;
    height: 18px;
    background: var(--dark);
    border-radius: 50%;
    position: relative;
    box-shadow: 2px -3px 0 0 var(--mid), 3px -5px 0 0 var(--accent);
    image-rendering: pixelated;
  }
  .bomb-pixel::after {
    content: '';
    position: absolute;
    width: 5px; height: 5px;
    background: rgba(255,255,255,0.45);
    border-radius: 50%;
    top: 3px; left: 3px;
  }

  .bomb-text {
    font-family: 'VT323', monospace;
    font-size: 38px;
    letter-spacing: 3px;
    color: var(--dark);
    background: var(--panel-bg);
    border: 3px solid var(--dark);
    padding: 2px 14px;
    white-space: nowrap;
    box-shadow: 3px 3px 0 var(--mid);
    transition: color 0.1s, border-color 0.1s, background 0.1s, box-shadow 0.1s;
    line-height: 1.1;
  }
  .word-bomb.matched .bomb-text {
    color: var(--accent2);
    border-color: var(--accent2);
    background: #d8eaff;
    box-shadow: 3px 3px 0 var(--accent2);
  }
  .word-bomb.danger .bomb-text {
    color: var(--accent);
    border-color: var(--accent);
    background: #ffe0d8;
    box-shadow: 3px 3px 0 var(--accent);
    animation: pixShake 0.25s steps(2) infinite;
  }
  .word-bomb.exploding { animation: pixExplode 0.4s steps(4) forwards; }
  .word-bomb.cleared   { animation: pixClear   0.35s steps(4) forwards; }

  @keyframes pixShake {
    0%,100% { transform: translateX(0); }
    50%     { transform: translateX(4px); }
  }
  @keyframes pixExplode {
    0%   { transform: scale(1);   opacity: 1; }
    40%  { transform: scale(1.8); opacity: 0.8; filter: brightness(4) saturate(0); }
    100% { transform: scale(3);   opacity: 0; }
  }
  @keyframes pixClear {
    0%   { transform: scale(1) translateY(0);    opacity: 1; filter: brightness(1); }
    30%  { transform: scale(1.3) translateY(-10px); filter: brightness(3); }
    100% { transform: scale(0.4) translateY(-50px); opacity: 0; }
  }

  /* ── Danger zone ── */
  #danger-line {
    position: absolute;
    bottom: 0; left: 0; right: 0;
    height: 44px;
    background: repeating-linear-gradient(
      90deg,
      rgba(212,48,0,0.08) 0, rgba(212,48,0,0.08) 10px,
      transparent 10px, transparent 20px
    );
    border-top: 3px dashed rgba(212,48,0,0.3);
    pointer-events: none;
    z-index: 2;
  }
  #danger-label {
    font-family: 'Press Start 2P', monospace;
    font-size: 7px;
    position: absolute;
    right: 12px; bottom: 8px;
    color: rgba(212,48,0,0.35);
    letter-spacing: 2px;
  }

  /* ── Level progress bar ── */
  #lvbar-wrap {
    position: absolute;
    top: 8px; left: 50%;
    transform: translateX(-50%);
    display: flex; align-items: center; gap: 6px;
    z-index: 4; pointer-events: none;
  }
  #lvbar-label { font-size: 6px; color: var(--mid); white-space: nowrap; }
  #lvbar-outer {
    width: 120px; height: 8px;
    border: 2px solid var(--mid);
    background: var(--bg);
  }
  #lvbar-fill {
    height: 100%;
    background: repeating-linear-gradient(
      90deg,
      var(--accent3) 0, var(--accent3) 6px,
      #005500 6px, #005500 8px
    );
    width: 0%;
    transition: width 0.3s steps(10);
  }

  /* ── Combo flash ── */
  #combo-flash {
    position: absolute;
    top: 38%; left: 50%;
    transform: translate(-50%,-50%);
    font-family: 'Press Start 2P', monospace;
    font-size: 18px;
    text-shadow: 3px 3px 0 var(--dark);
    pointer-events: none;
    opacity: 0;
    z-index: 20;
    white-space: nowrap;
    letter-spacing: 2px;
  }
  #combo-flash.show { animation: comboAnim 0.7s steps(6) forwards; }
  @keyframes comboAnim {
    0%  { opacity: 1; transform: translate(-50%,-50%) scale(0.5); }
    20% { transform: translate(-50%,-50%) scale(1.3); }
    70% { opacity: 1; }
    100%{ opacity: 0; transform: translate(-50%,-90%); }
  }

  /* ── Input Bar (floating inside game area) ── */
  #input-bar {
    position: absolute;
    bottom: 60px;
    left: 50%;
    transform: translateX(-50%);
    display: flex;
    align-items: center;
    gap: 10px;
    z-index: 10;
    background: var(--panel-bg);
    border: 3px solid var(--dark);
    box-shadow: 5px 5px 0 var(--mid);
    padding: 8px 16px;
    width: 460px;
    max-width: 90vw;
  }
  #input-label { font-size: 8px; color: var(--mid); letter-spacing: 1px; white-space: nowrap; }
  #word-input {
    flex: 1;
    background: #fff;
    border: 3px solid var(--dark);
    box-shadow: 3px 3px 0 var(--mid);
    color: var(--dark);
    font-family: 'VT323', monospace;
    font-size: 32px;
    letter-spacing: 3px;
    padding: 4px 12px;
    outline: none;
    caret-color: var(--accent);
    transition: border-color 0.1s, box-shadow 0.1s;
  }
  #word-input:focus { border-color: var(--accent2); box-shadow: 3px 3px 0 var(--accent2); }
  #word-input.wrong {
    border-color: var(--accent);
    box-shadow: 3px 3px 0 var(--accent);
    animation: inputShake 0.2s steps(3);
  }
  @keyframes inputShake {
    0%,100% { transform: translateX(0); }
    33% { transform: translateX(-6px); }
    66% { transform: translateX(6px); }
  }

  /* ── Overlays ── */
  .overlay {
    display: none;
    position: absolute;
    inset: 0;
    background: rgba(245,240,232,0.93);
    z-index: 50;
    flex-direction: column;
    align-items: center;
    justify-content: center;
  }
  .overlay.active { display: flex; }

  .obox {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 16px;
    background: var(--panel-bg);
    border: 4px solid var(--dark);
    box-shadow: 6px 6px 0 var(--mid);
    padding: 28px 44px;
  }
  .otitle {
    font-size: 28px;
    letter-spacing: 4px;
    text-shadow: 4px 4px 0 var(--mid);
    line-height: 1.3;
    text-align: center;
  }
  .osub {
    font-family: 'VT323', monospace;
    font-size: 19px;
    color: var(--mid);
    letter-spacing: 2px;
    text-align: center;
    max-width: 440px;
    line-height: 2;
  }
  .btn-row { display: flex; gap: 10px; flex-wrap: wrap; justify-content: center; }

  .pbtn {
    font-family: 'Press Start 2P', monospace;
    font-size: 9px;
    letter-spacing: 2px;
    padding: 9px 18px;
    border: 3px solid var(--dark);
    cursor: pointer;
    box-shadow: 4px 4px 0 var(--dark);
    transition: transform 0.05s, box-shadow 0.05s;
  }
  .pbtn:hover  { transform: translate(2px,2px); box-shadow: 2px 2px 0 var(--dark); }
  .pbtn:active { transform: translate(4px,4px); box-shadow: none; }
  .pbtn-red   { background: var(--accent);  color: #fff; }
  .pbtn-blue  { background: var(--accent2); color: #fff; }
  .pbtn-green { background: var(--accent3); color: #fff; }
  .pbtn-dark  { background: var(--dark);    color: var(--bg); }
  .pbtn-plain { background: var(--panel-bg); color: var(--dark); }

  /* ── Word Editor ── */
  #editor-panel {
    display: none;
    position: absolute;
    inset: 0;
    background: rgba(245,240,232,0.96);
    z-index: 60;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 12px;
    padding: 24px;
  }
  #editor-panel.active { display: flex; }
  #editor-title { font-size: 13px; letter-spacing: 3px; color: var(--accent2); text-shadow: 2px 2px 0 var(--dark); }
  #editor-sub { font-family: 'VT323', monospace; font-size: 17px; color: var(--mid); letter-spacing: 2px; }
  #word-textarea {
    width: 100%; max-width: 460px; height: 240px;
    background: #fff;
    border: 3px solid var(--dark);
    box-shadow: 4px 4px 0 var(--mid);
    color: var(--dark);
    font-family: 'VT323', monospace;
    font-size: 18px;
    line-height: 1.7;
    padding: 10px 14px;
    outline: none; resize: none;
    letter-spacing: 1px;
  }
  #editor-info { font-size: 8px; color: var(--mid); letter-spacing: 1px; }
</style>
</head>
<body>

<!-- Header -->
<div id="header">
  <div id="title">★ WORD RAIN ★</div>
  <div class="stat-block">
    <div class="stat">
      <div class="stat-label">SCORE</div>
      <div class="stat-value" id="score-display">0</div>
    </div>
    <div class="stat">
      <div class="stat-label">COMBO</div>
      <div class="stat-value" id="combo-display">×1</div>
    </div>
    <div class="stat">
      <div class="stat-label">LEVEL</div>
      <div class="stat-value" id="level-display">1</div>
    </div>
    <div class="stat">
      <div class="stat-label">LIVES</div>
      <div class="stat-value" id="lives-display" style="color:var(--accent)">♥♥♥</div>
    </div>
    <button id="pause-btn" onclick="togglePause()">⏸ PAUSE</button>
  </div>
</div>

<!-- Game Area -->
<div id="game-area">
  <div id="lvbar-wrap">
    <div id="lvbar-label">NEXT LV</div>
    <div id="lvbar-outer"><div id="lvbar-fill"></div></div>
  </div>
  <div id="danger-line"><div id="danger-label">▼ DANGER ZONE ▼</div></div>
  <div id="combo-flash"></div>
  <!-- Input Bar floating inside game area -->
  <div id="input-bar">
    <div id="input-label">INPUT▶</div>
    <input type="text" id="word-input"
      autocomplete="off" autocorrect="off" autocapitalize="off" spellcheck="false"
      placeholder="type here...">
  </div>
</div>

<!-- Start Screen -->
<div class="overlay active" id="start-screen">
  <div class="obox">
    <div class="otitle" style="color:var(--accent2)">WORD RAIN</div>
    <div class="osub">
      수능 영단어 타자연습 게임<br>
      단어가 떨어지기 전에 타이핑하세요!<br>
      ♥×3 라이프 &nbsp;|&nbsp; 콤보 배율 &nbsp;|&nbsp; 5단계 레벨<br>
      <small style="font-size:14px">ESC = 일시정지</small>
    </div>
    <div class="btn-row">
      <button class="pbtn pbtn-blue" onclick="startGame()">▶ START</button>
      <button class="pbtn pbtn-plain" onclick="openEditor()">✎ WORDS</button>
    </div>
  </div>
</div>

<!-- Pause Screen -->
<div class="overlay" id="pause-screen">
  <div class="obox">
    <div class="otitle" style="color:var(--mid)">PAUSED</div>
    <div class="osub">게임이 일시정지 되었습니다</div>
    <div class="btn-row">
      <button class="pbtn pbtn-dark" onclick="togglePause()">▶ RESUME</button>
      <button class="pbtn pbtn-plain" onclick="openEditor()">✎ WORDS</button>
      <button class="pbtn pbtn-red" onclick="quitToMenu()">■ QUIT</button>
    </div>
  </div>
</div>

<!-- Game Over -->
<div class="overlay" id="gameover-screen">
  <div class="obox">
    <div class="otitle" style="color:var(--accent)">GAME<br>OVER</div>
    <div class="osub" id="final-score-text"></div>
    <div class="btn-row">
      <button class="pbtn pbtn-red" onclick="startGame()">▶ RETRY</button>
      <button class="pbtn pbtn-plain" onclick="quitToMenu()">■ MENU</button>
    </div>
  </div>
</div>

<!-- Clear -->
<div class="overlay" id="clear-screen">
  <div class="obox">
    <div class="otitle" style="color:var(--accent3)">★ CLEAR ★</div>
    <div class="osub" id="clear-score-text"></div>
    <button class="pbtn pbtn-green" onclick="startGame()">▶ AGAIN</button>
  </div>
</div>

<!-- Word Editor -->
<div id="editor-panel">
  <div id="editor-title">✎ WORD LIST EDITOR</div>
  <div id="editor-sub">한 줄에 하나씩 — 영어 단어만 입력하세요</div>
  <textarea id="word-textarea" spellcheck="false"></textarea>
  <div id="editor-info"></div>
  <div class="btn-row">
    <button class="pbtn pbtn-blue" onclick="saveWords()">SAVE</button>
    <button class="pbtn pbtn-plain" onclick="closeEditor()">CANCEL</button>
  </div>
</div>

<script>
const DEFAULT_WORDS = [
  "abandon","abolish","absorb","abstract","abundant","accelerate","access",
  "accommodate","accomplish","accumulate","accurate","achieve","acknowledge",
  "acquire","adapt","adequate","adjust","admire","adopt","advocate",
  "affect","afford","aggressive","allocate","alter","ambiguous","ambitious",
  "anticipate","anxiety","apparent","appreciate","approach","appropriate",
  "approximate","argue","arise","assess","assign","assume","assure",
  "attach","attain","attempt","attribute","authentic","available","aware",
  "balance","barrier","benefit","capacity","challenge","character","circumstance",
  "collaborate","combine","commit","communicate","compare","compete","complex",
  "concentrate","conclude","conduct","consequence","consider","contribute",
  "contrast","convince","cooperate","create","crucial","cultural","decline",
  "define","demonstrate","depend","derive","describe","determine","develop",
  "distinguish","distribute","diverse","dominate","emphasize","enable","enhance",
  "enormous","ensure","establish","evaluate","examine","expand","expect",
  "experience","explain","exploit","explore","express","extend","extreme",
  "facilitate","familiar","feature","flexible","focus","function","generate",
  "identify","ignore","impact","implement","imply","improve","include",
  "increase","indicate","influence","inform","innovative","interpret","involve",
  "justify","maintain","manage","measure","motivate","negative","negotiate",
  "objective","observe","obtain","obvious","occur","oppose","overcome",
  "participate","perceive","perform","perspective","persuade","positive","prevent",
  "priority","produce","promote","propose","protect","provide","pursue",
  "recognize","reflect","relate","relevant","require","research","respond",
  "reveal","significant","solution","strategy","structure","suggest","support",
  "survive","sustain","transfer","transform","unique","utilize","various"
];

let words = [...DEFAULT_WORDS];
let bombs = [], score = 0, combo = 1, lives = 3, level = 1;
let gameRunning = false, paused = false;
let spawnTimer = null, frameId = null, totalCleared = 0;

const LEVELS = [
  { speed: 0.28, spawnInterval: 3400, maxBombs: 5 },
  { speed: 0.42, spawnInterval: 2700, maxBombs: 6 },
  { speed: 0.58, spawnInterval: 2100, maxBombs: 7 },
  { speed: 0.74, spawnInterval: 1600, maxBombs: 8 },
  { speed: 0.94, spawnInterval: 1200, maxBombs: 10 },
];
const BOMBS_PER_LEVEL = 20;

const gameArea   = document.getElementById('game-area');
const wordInput  = document.getElementById('word-input');
const scoreDisp  = document.getElementById('score-display');
const comboDisp  = document.getElementById('combo-display');
const levelDisp  = document.getElementById('level-display');
const livesDisp  = document.getElementById('lives-display');
const comboFlash = document.getElementById('combo-flash');
const lvbarFill  = document.getElementById('lvbar-fill');
const pauseBtn   = document.getElementById('pause-btn');

// ── Editor ────────────────────────────────────────────────────────
function openEditor() {
  if (gameRunning && !paused) pauseGame();
  document.getElementById('editor-panel').classList.add('active');
  document.getElementById('word-textarea').value = words.join('\n');
  updateEditorInfo();
}
function updateEditorInfo() {
  const n = document.getElementById('word-textarea').value
    .split('\n').map(s=>s.trim()).filter(Boolean).length;
  document.getElementById('editor-info').textContent = n + ' WORDS LOADED';
}
document.getElementById('word-textarea').addEventListener('input', updateEditorInfo);
function saveWords() {
  const parsed = document.getElementById('word-textarea').value
    .split('\n').map(s=>s.trim().toLowerCase().replace(/[^a-z]/g,'')).filter(s=>s.length>=2);
  if (parsed.length < 5) { alert('최소 5개 이상의 단어가 필요합니다!'); return; }
  words = parsed;
  closeEditor();
}
function closeEditor() {
  document.getElementById('editor-panel').classList.remove('active');
  if (gameRunning && paused) wordInput.focus();
}

// ── Game ──────────────────────────────────────────────────────────
function startGame() {
  bombs.forEach(b => b.el && b.el.remove());
  bombs = []; score = 0; combo = 1; lives = 3; level = 1; totalCleared = 0; paused = false;
  ['start-screen','gameover-screen','clear-screen','pause-screen'].forEach(id =>
    document.getElementById(id).classList.remove('active'));
  pauseBtn.textContent = '⏸ PAUSE';
  pauseBtn.classList.add('visible');
  updateHUD();
  gameRunning = true;
  wordInput.value = '';
  wordInput.focus();
  scheduleSpawn();
  cancelAnimationFrame(frameId);
  frameId = requestAnimationFrame(gameLoop);
}

function gameLoop() {
  if (!gameRunning || paused) return;
  moveBombs();
  matchHighlight();
  frameId = requestAnimationFrame(gameLoop);
}

function togglePause() {
  if (!gameRunning) return;
  paused ? resumeGame() : pauseGame();
}
function pauseGame() {
  paused = true;
  clearTimeout(spawnTimer);
  cancelAnimationFrame(frameId);
  document.getElementById('pause-screen').classList.add('active');
  pauseBtn.textContent = '▶ RESUME';
}
function resumeGame() {
  paused = false;
  document.getElementById('pause-screen').classList.remove('active');
  pauseBtn.textContent = '⏸ PAUSE';
  scheduleSpawn();
  frameId = requestAnimationFrame(gameLoop);
  wordInput.focus();
}
function quitToMenu() {
  gameRunning = false; paused = false;
  clearTimeout(spawnTimer); cancelAnimationFrame(frameId);
  bombs.forEach(b => b.el && b.el.remove()); bombs = [];
  ['pause-screen','gameover-screen','clear-screen'].forEach(id =>
    document.getElementById(id).classList.remove('active'));
  pauseBtn.classList.remove('visible');
  document.getElementById('start-screen').classList.add('active');
}

document.addEventListener('keydown', e => {
  if (e.key === 'Escape' && gameRunning) togglePause();
});

// ── Spawn ─────────────────────────────────────────────────────────
function scheduleSpawn() {
  clearTimeout(spawnTimer);
  if (!gameRunning || paused) return;
  const cfg = LEVELS[level-1];
  spawnTimer = setTimeout(() => { spawnBomb(); scheduleSpawn(); },
    cfg.spawnInterval + (Math.random()*600-300));
}
function spawnBomb() {
  if (paused) return;
  const cfg = LEVELS[level-1];
  if (bombs.filter(b=>b.alive).length >= cfg.maxBombs) return;
  const word = words[Math.floor(Math.random()*words.length)];
  const areaW = gameArea.clientWidth;
  const el = document.createElement('div');
  el.className = 'word-bomb';
  const icon = document.createElement('div');
  icon.className = 'bomb-pixel';
  const label = document.createElement('div');
  label.className = 'bomb-text';
  label.textContent = word;
  el.appendChild(icon); el.appendChild(label);
  gameArea.appendChild(el);
  const x = 30 + Math.random() * (areaW - 160);
  el.style.left = x + 'px'; el.style.top = '-60px';
  bombs.push({ word, el, label, x, y: -60,
    speed: cfg.speed + Math.random()*0.12, alive: true });
}

// ── Move ──────────────────────────────────────────────────────────
function moveBombs() {
  const areaH = gameArea.clientHeight, dangerY = areaH - 50;
  for (const b of bombs) {
    if (!b.alive) continue;
    b.y += b.speed;
    b.el.style.top = b.y + 'px';
    if (b.y > dangerY - 30) b.el.classList.add('danger');
    else b.el.classList.remove('danger');
    if (b.y > areaH) bombEscaped(b);
  }
}
function bombEscaped(b) {
  b.alive = false;
  b.el.classList.add('exploding');
  setTimeout(() => b.el.remove(), 400);
  lives = Math.max(0, lives-1);
  combo = 1; updateHUD();
  if (lives <= 0) endGame();
}

// ── Input ─────────────────────────────────────────────────────────
wordInput.addEventListener('input', matchHighlight);
wordInput.addEventListener('keydown', e => { if (e.key === 'Enter') checkWord(); });

function checkWord() {
  if (paused) return;
  const typed = wordInput.value.trim().toLowerCase();
  if (!typed) return;
  const hit = bombs.find(b => b.alive && b.word === typed);
  if (hit) {
    clearBomb(hit); wordInput.value = ''; matchHighlight();
  } else {
    wordInput.classList.add('wrong');
    setTimeout(() => wordInput.classList.remove('wrong'), 250);
    combo = 1; updateHUD();
  }
}
function matchHighlight() {
  const typed = wordInput.value.trim().toLowerCase();
  for (const b of bombs) {
    if (!b.alive) continue;
    typed && b.word.startsWith(typed)
      ? b.el.classList.add('matched')
      : b.el.classList.remove('matched');
  }
}
function clearBomb(b) {
  b.alive = false;
  b.el.classList.remove('danger','matched');
  b.el.classList.add('cleared');
  setTimeout(() => b.el.remove(), 350);
  const pts = b.word.length * 10 * combo;
  score += pts; combo = Math.min(combo+1, 8); totalCleared++;
  updateHUD(); showCombo(combo, pts); checkLevelUp();
}
function showCombo(c, pts) {
  comboFlash.classList.remove('show');
  void comboFlash.offsetWidth;
  if (c > 2) { comboFlash.textContent = `×${c} COMBO! +${pts}`; comboFlash.style.color='var(--accent3)'; }
  else        { comboFlash.textContent = `+${pts}`;              comboFlash.style.color='var(--accent2)'; }
  comboFlash.classList.add('show');
}
function checkLevelUp() {
  if (totalCleared >= level * BOMBS_PER_LEVEL && level < LEVELS.length) {
    level++; updateHUD();
    comboFlash.classList.remove('show'); void comboFlash.offsetWidth;
    comboFlash.textContent = `★ LEVEL ${level}! ★`;
    comboFlash.style.color = 'var(--accent)';
    comboFlash.classList.add('show');
  }
  if (level >= LEVELS.length && totalCleared >= LEVELS.length * BOMBS_PER_LEVEL) gameClear();
}

// ── HUD ───────────────────────────────────────────────────────────
function updateHUD() {
  scoreDisp.textContent = score.toLocaleString();
  comboDisp.textContent = '×' + combo;
  levelDisp.textContent = level;
  livesDisp.textContent = '♥'.repeat(lives) + '♡'.repeat(Math.max(0, 3-lives));
  const prev = (level-1)*BOMBS_PER_LEVEL;
  lvbarFill.style.width = (Math.min((totalCleared-prev)/BOMBS_PER_LEVEL,1)*100) + '%';
}

// ── End ───────────────────────────────────────────────────────────
function endGame() {
  gameRunning = false;
  clearTimeout(spawnTimer); cancelAnimationFrame(frameId);
  bombs.forEach(b => { b.alive=false; b.el && b.el.remove(); }); bombs = [];
  pauseBtn.classList.remove('visible');
  document.getElementById('final-score-text').innerHTML =
    `SCORE: ${score.toLocaleString()}<br>CLEARED: ${totalCleared} WORDS<br>LEVEL: ${level}`;
  document.getElementById('gameover-screen').classList.add('active');
}
function gameClear() {
  gameRunning = false;
  clearTimeout(spawnTimer); cancelAnimationFrame(frameId);
  pauseBtn.classList.remove('visible');
  document.getElementById('clear-score-text').innerHTML =
    `SCORE: ${score.toLocaleString()}<br>ALL ${totalCleared} WORDS!`;
  document.getElementById('clear-screen').classList.add('active');
}

// ── Focus ─────────────────────────────────────────────────────────
document.addEventListener('click', e => {
  if (gameRunning && !paused &&
      !e.target.closest('.overlay') &&
      !e.target.closest('#editor-panel') &&
      !e.target.closest('#pause-btn'))
    wordInput.focus();
});

updateHUD();
</script>
</body>
</html>
